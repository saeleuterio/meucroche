<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a9068"/>
      <stop offset="100%" style="stop-color:#5a6e48"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.12)"/>
    </pattern>
  </defs>
  <rect width="700" height="400" fill="url(#bg)"/>
  <rect width="700" height="400" fill="url(#dots)"/>
  <text x="350" y="230" text-anchor="middle" font-size="140" font-family="serif" opacity="0.3">🧵</text>
  <rect x="160" y="320" width="380" height="50" rx="10" fill="rgba(255,255,255,0.12)"/>
  <text x="350" y="348" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" font-family="Arial">Adicione sua imagem promocional aqui — 700×400px</text>
</svg>
