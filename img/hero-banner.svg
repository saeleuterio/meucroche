<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d9c4"/>
      <stop offset="100%" style="stop-color:#d4c0a8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#c4855a" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="600" height="700" fill="url(#bg)" rx="24"/>
  <rect width="600" height="700" fill="url(#dots)" rx="24"/>
  <!-- Yarn ball decorative -->
  <circle cx="300" cy="320" r="140" fill="none" stroke="#c4855a" stroke-width="3" opacity="0.3"/>
  <circle cx="300" cy="320" r="110" fill="none" stroke="#c4855a" stroke-width="2" opacity="0.25"/>
  <circle cx="300" cy="320" r="80" fill="none" stroke="#c4855a" stroke-width="1.5" opacity="0.2"/>
  <!-- Crochet hook icon -->
  <text x="300" y="380" text-anchor="middle" font-size="120" fill="#9e5f38" opacity="0.35" font-family="serif">🧶</text>
  <!-- Label -->
  <rect x="160" y="580" width="280" height="60" rx="30" fill="#c4855a" opacity="0.15"/>
  <text x="300" y="616" text-anchor="middle" font-size="14" fill="#4a3728" font-family="Georgia, serif" font-style="italic" opacity="0.7">Adicione sua foto aqui</text>
  <text x="300" y="634" text-anchor="middle" font-size="11" fill="#7a6553" font-family="Arial" opacity="0.6">600 × 700 px recomendado</text>
</svg>
